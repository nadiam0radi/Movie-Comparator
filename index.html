<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.19.0/axios.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Movie Fight</title>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900">
    <section class="mb-5 bg-gradient-to-r from-teal-600 to-emerald-500 text-white shadow">
      <div class="py-12">
        <div class="mx-auto max-w-6xl px-4">
          <h1 class="flex items-center text-5xl font-semibold tracking-tight">
            Movie Fight
            <span class="ml-4 inline-flex items-center text-4xl">
              <i class="fas fa-film"></i>
            </span>
          </h1>
        </div>
      </div>
    </section>


    <main class="mx-auto max-w-6xl px-4">
      <div class="autocomplete"></div>
      <div id="summary"></div>
    </main>

    <script src="autocomplete.js"></script>
    <script src="index.js"></script>
  </body>
</html>
